behaviors:
  DroneAgent:
    trainer_type: ppo
    max_steps: 10005000
    time_horizon: 128

    hyperparameters:
      batch_size: 1024 # Larger batch — more agents generating data
      buffer_size: 10240 # Larger buffer for multi-agent
      learning_rate: 2.0e-4
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      hidden_units: 256
      num_layers: 2
      normalize: true
      encoding_size: 256
      memory:
        memory_size: 128
        sequence_length: 64

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
      curiosity:
        strength: 0.05
        gamma: 0.99
        learning_rate: 3.0e-4

    summary_freq: 10000
    checkpoint_interval: 50000
    keep_checkpoints: 5

# --------------------------------------------------------------------
# Curriculum: Fixed progression with realistic thresholds
# --------------------------------------------------------------------
environment_parameters:
  hover_height:
    curriculum:
      - name: hover_training
        value: 5.0
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 0.5 # Lowered - just needs to stay airborne consistently
          min_lesson_length: 300
          signal_smoothing: true

  target_distance:
    curriculum:
      - name: hover_training
        value: 0.0
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 0.5
          min_lesson_length: 300
          signal_smoothing: true

      - name: easy_distance
        value: 8.0 # Start closer
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 5.0 # Realistic: find ~1 victim
          min_lesson_length: 500
          signal_smoothing: true

      - name: medium_distance
        value: 12.0
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 8.0 # Find 1-2 victims
          min_lesson_length: 700
          signal_smoothing: true

      - name: far_distance
        value: 20.0 # Actually harder than medium

  obstacle_count:
    curriculum:
      - name: hover_training
        value: 0
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 0.5
          min_lesson_length: 300
          signal_smoothing: true

      - name: no_obstacles
        value: 0
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 5.0
          min_lesson_length: 500
          signal_smoothing: true

      - name: few_obstacles
        value: 2 # Start with fewer obstacles
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 10.0 # Must find 2+ victims while avoiding obstacles
          min_lesson_length: 1500
          signal_smoothing: true

      - name: more_obstacles
        value: 4
        completion_criteria:
          measure: reward
          behavior: DroneAgent
          threshold: 8.0 # Harder with more obstacles - lower bar but still solid
          min_lesson_length: 2000
          signal_smoothing: true

      - name: max_obstacles
        value: 6
